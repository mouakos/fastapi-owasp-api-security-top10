repos:
  # Run the linter.
  - repo: local
    hooks:
      - id: ruff-check
        args: [--fix]
        name: ruff-check
        entry: .venv/Scripts/ruff.exe check
        language: system
        types: [python]
        files: ^app/.*\.py$

  # Run the formatter.
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: .venv/Scripts/ruff.exe format
        language: system
        types: [python]
        files: ^app/.*\.py$

  # Type checking with MyPy
  - repo: local
    hooks:
      - id: mypy-check
        name: mypy-check
        entry: .venv/Scripts/mypy.exe
        language: system
        types: [python]
        files: ^app/.*\.py$

  # Audit dependencies for known vulnerabilities (OWASP A06)
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        # CVE-2026-4539: affects pygments (transitive via pytest/rich). No fix version yet.
        # Remove --ignore-vuln once pygments > 2.19.2 is released.
        entry: .venv/Scripts/pip-audit.exe --local --ignore-vuln CVE-2026-4539
        language: system
        pass_filenames: false
        always_run: true
