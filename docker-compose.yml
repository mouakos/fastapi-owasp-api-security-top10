services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U appuser -d appdb -h localhost -p 5432 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:apppassword@db:5432/appdb
      LOG_TO_FILE: false # Containers should keep this False and let the orchestrator capture stdout.
      LOG_LEVEL: "INFO" # Set default log level for the database container
      LOG_SERIALIZED: true # Enable structured logging for better log management
    ports:
      - "8000:8000"

volumes:
  postgres_data:
